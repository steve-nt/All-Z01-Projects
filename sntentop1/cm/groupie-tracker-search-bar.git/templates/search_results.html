<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <title>Search Results</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            color: #333;
        }
        .artist-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .artist-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .artist-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .artist-card a {
            text-decoration: none;
            color: #2a7ae2;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .artist-card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
        .button {
            --green: #000000;
            font-size: 16px;
            padding: 1em 3em;
            letter-spacing: 0.06em;
            position: relative;
            font-family: inherit;
            border-radius: 0.6em;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            line-height: 1.4em;
            border: 2px solid var(--green);
            background: linear-gradient(to right, #2a7ae2 1%, transparent 40%, transparent 60%, rgba(27, 253, 156, 0.1) 100%);
            color: var(--green);
            box-shadow: inset 0 0 10px #2a7ae2, 0 0 9px 3px rgba(20, 34, 28, 0.1);
            text-decoration: none;
            display: inline-block;
            text-align: center;
            cursor: pointer;
            margin-top: 20px;
        }
        .button:hover {
            color: #000000;
            box-shadow: inset 0 0 10px #2a7ae2, 0 0 9px 3px rgba(25, 27, 26, 0.2);
        }
        .button::before {
            content: "";
            position: absolute;
            left: -4em;
            width: 4em;
            height: 100%;
            top: 0;
            transition: transform 0.4s ease-in-out;
            background: linear-gradient(to right, transparent 1%, rgba(27, 253, 156, 0.1) 40%, rgba(27, 253, 156, 0.1) 60%, transparent 100%);
        }
        .button:hover::before {
            transform: translateX(15em);
        }
        .artist-container h2 {
           
           text-align: center;
           font-size: 1.2rem;
           padding: 20px;
           color: #666;
           margin-top: 60px;

       }
    </style>
</head>
<body>
    <h1>Search Results</h1>
    <div class="artist-container">
        {{range .}}
        <div class="artist-card">
            <a href="/artist?id={{.ID}}">
                <img src="{{.Image}}" alt="{{.Name}}">
                <span><strong>{{.Name}}</strong></span><br>
            </a>
        </div>
        {{else}}
        <h2><h2>
        <h3>No artists or locations found for your search.</h3>
        {{end}}
    </div>
    
    <div class="button-container" style="text-align: center;">
        <a href="/" class="button">Back to Home</a>
    </div>
</body>
</html>
