<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: linear-gradient(135deg, #000000 0%, #190420 100%);
    }
    img {
  max-width: relative;
 
  border-bottom: 4px solid rgba(43, 5, 43, 0.742);
  border-top: 4px solid rgba(36, 35, 35, 0.742);
  border-left: 0;
  border-right: 0;
  /* Using border image gradients */
  border-image-slice: 1;
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-image-source: linear-gradient(135deg, #000000 0%, #190420 100%);
}

    h1 {
      font-size: 2rem;
      color: #333;
    }
    p {
      color: #666;
    }
  </style>
</head>
<body>
  <h1>404 - Page Not Found</h1>
  <p>Sorry, the page you're looking for doesn't exist.</p>
  <img loading="lazy" decoding="async" width="520" height="404" src="https://i.pinimg.com/736x/42/64/67/4264673c1f6d92a690b31c9865bdabcc.jpg" class="featured-img wp-post-image" alt="">
</body>
</html>
