
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign Up</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/signup.page.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="navbar-left">
          <a href="/" class="logo">.Myforum</a>
          <div class="line"></div>
          <div class="user">Guest</div>
        </div>
        <div class="navbar-right">
          <a class="btn" href="/login">Log In</a>
        </div>
      </nav>
    </header>
    <div class="center-container">
      <div class="signup-container">
    <h1>Create Your Account</h1>
    <form id="signup-form" class="signup-form" action="/signup" method="POST">
    <div class="username">
        <label for="username-input" class="username-label">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
            <path d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/>
          </svg>
        </label>
        <input required type="text" name="username" id="username-input" class="username-input" placeholder="Username" />
      </div>
      <div class="email">
        <label for="email-input" class="email-label">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
            <path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Zm320-280 320-200v-80L480-520 160-720v80l320 200Z"/>
          </svg>
        </label>
        <input required type="email" name="email" id="email-input" class="email-input" placeholder="Email" />
      </div>
      <div class="password">
        <label for="password-input" class="password-label">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
            <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/>
          </svg> 
        </label>
        <input required type="password" name="password" id="password-input" class="password-input" placeholder="Password" />
      </div>
      <div class="repeat-password" >
        <label for="repeat-password-input" class="repeat-password-label">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#ffffff">
            <path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm240-200q33 0 56.5-23.5T560-360q0-33-23.5-56.5T480-440q-33 0-56.5 23.5T400-360q0 33 23.5 56.5T480-280ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/>
          </svg>
        </label>
        <input required type="password" name="repeat-password" id="repeat-password-input" class="repeat-password-input" placeholder="Repeat Password" />
      </div>
      <button type="submit" class="sign-up-btn" >Sign Up</button>
    </form>
    <!-- 🌐 Social login section -->
      <div class="social-login">
        <p class="social-description">Or sign up with</p>
        <div class="social-buttons">
          <a href="/auth/signup?provider=google" class="social-btn google-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.9C34.7 33.8 29.8 37 24 37 16.8 37 11 31.2 11 24S16.8 11 24 11c3.3 0 6.2 1.1 8.6 3.1l6.3-6.3C35.3 4.8 29.9 3 24 3 11.9 3 2 12.9 2 25s9.9 22 22 22c12.5 0 21-8.7 21-21 0-1.4-.2-2.9-.5-4Z"/></svg>
            Google
          </a>
          <a href="/auth/signup?provider=github" class="social-btn github-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2.3c-3.2.7-3.9-1.5-3.9-1.5-.5-1.2-1.1-1.6-1.1-1.6-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.5 1.1 3.1.8.1-.6.4-1.1.7-1.3-2.5-.3-5.1-1.3-5.1-5.7 0-1.3.5-2.4 1.2-3.2 0-.3-.5-1.4.1-2.9 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.5.1 2.6.1 2.9.7.8 1.2 1.9 1.2 3.2 0 4.4-2.6 5.4-5.1 5.7.4.3.7.9.7 1.8v2.7c0 .3.2.7.8.6A10.9 10.9 0 0 0 23.5 12C23.5 5.7 18.3.5 12 .5Z"/></svg>
            GitHub
          </a>
          <a href="/auth/signup?provider=facebook" class="social-btn facebook-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#fff" d="M24 4C12.95 4 4 12.95 4 24c0 9.95 7.25 18.2 16.75 19.8v-14h-5v-5.8h5v-4.4c0-5 3-7.7 7.5-7.7 2.15 0 4.4.4 4.4.4v4.8h-2.5c-2.45 0-3.2 1.5-3.2 3v3.6h5.5l-.9 5.8h-4.6v14C36.75 42.2 44 33.95 44 24c0-11.05-8.95-20-20-20z"/></svg>
            Facebook
          </a>
        </div>
      </div>
  </div>
  </div>

    <!-- Success Popup -->
  <div class="popup success" id="success-popup">
    <div class="popup-content">
      <h2 id="success-message"></h2>
      <button onclick="closePopup('success-popup')">OK</button>
    </div>
  </div>

  <!-- Error Popup -->
  <div class="popup error" id="error-popup">
    <div class="popup-content">
    <h2>Registration failed</h2>
      <ul class="error-list" id="error-list"></ul>
      <button onclick="closePopup('error-popup')">Close</button>
    </div>
  </div>
  <div class="bottom-blank">
      </div>
  <footer>
  <p class="footer">© 2025 Myforum. All rights reserved.</p>
  </footer>

 <script src="/static/sign-up.page.js"></script>
  </body>
   
</html>
