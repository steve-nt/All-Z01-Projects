# Upload + redirect example. /old → /new (301), /upload accepts POST/DELETE.

[[server]]
listen = ["127.0.0.1:8080"]
client_max_body_size = 10485760  # 10 MiB

[[server.route]]
path = "/"
methods = ["GET"]
root = "www"
index = "index.html"
autoindex = true

[[server.route]]
path = "/upload"
methods = ["GET", "POST", "DELETE"]
root = "uploads"
upload_dir = "uploads"

[[server.route]]
path = "/old"
methods = ["GET"]
redirect = "/new"
redirect_status = 301
