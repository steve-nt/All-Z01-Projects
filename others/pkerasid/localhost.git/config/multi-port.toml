# Two distinct sites on two ports.

[[server]]
listen = ["127.0.0.1:8080"]
client_max_body_size = 1048576
[[server.route]]
path = "/"
methods = ["GET"]
root = "www/site-a"
index = "index.html"

[[server]]
listen = ["127.0.0.1:8081"]
client_max_body_size = 1048576
[[server.route]]
path = "/"
methods = ["GET"]
root = "www/site-b"
index = "index.html"
