<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker</title>
    <link 
      rel="stylesheet" 
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/styles.css">
   
</head>
<body>
    <header>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
        <img src="/static/assets/header.png" alt="Groupie Tracker" />
        <div class="search-wrapper">
          <div class="checkbox-container">
            <h3>Advanced Filters</h3>
          
            <div class="filter-item">
              <input type="checkbox" value="year-of-formation">Year of formation
              <div class="filter-box"></div>
            </div>
          
            <div class="filter-item">
              <input type="checkbox" value="year-of-firstAlbum">Year of first album
              <div class="filter-box"></div>
            </div>
                                   
            <div class="filter-item">
              <input type="checkbox" value="concert-location">Concert location
              <div class="filter-box"></div>
            </div>
            
            <div class="checkbox-group">
              No. of Members
              <label><input type="checkbox" name="members" value="1"> 1</label><br>
              <label><input type="checkbox" name="members" value="2"> 2</label><br>
              <label><input type="checkbox" name="members" value="3"> 3</label><br>
              <label><input type="checkbox" name="members" value="4"> 4</label><br>
              <label><input type="checkbox" name="members" value="5"> 5 </label><br>
              <label><input type="checkbox" name="members" value="6"> 6 </label><br>
              <label><input type="checkbox" name="members" value="7"> 7+ </label>
              
            </div>
            <!-- Global Apply Filters Button -->
            <button id="global-apply-btn" class="global-apply-btn">Apply Filters</button>
          </div>
            <div class="search-bar">
              <input id="search" type="search" placeholder="🔍 Start typing to search...">
              
              <div class="clear-btn" onclick="clearText()">×</div>
            </div>
            <button id="search-btn" class="search-btn">Search</button>
            <div class="search-container">
              <div class="search-display"></div> <!-- Suggestions will appear here -->
            </div>
            
          </div>
        
    </header>
    
    
    <main id="band-container">
        <!-- Cards will be dynamically injected here -->
        <div id="mapid"></div>
    </main>

    <script>
      window.artistData = [
          {{range $index, $artist := .Artists}}{{if $index}}, {{end}}{
              name: "{{.Name}}",
              image: "{{.Image}}",
              firstAlbum: "{{.FirstAlbum}}",
              creationDate: {{.CreationDate}},
              members: [{{range $i, $member := .Members}}{{if $i}}, {{end}}{{printf "%q" $member}}{{end}}],
              dates: [{{range $i, $date := .Dates}}{{if $i}}, {{end}}{{printf "%q" $date}}{{end}}],
              locations: {{if .Locations}}[{{range $i, $location := .Locations}}{{if $i}}, {{end}}{{printf "%q" $location}}{{end}}]{{else}}[]{{end}},  <!-- ✅ Ensures locations are always present -->
              events: {
                  {{- $first := true -}}
                  {{- range $key, $value := .Relation -}}
                      {{- if not $first}}, {{end -}}
                      {{- $first = false -}}
                      {{printf "%q" $key}}: {{printf "%q" $value}}
                  {{- end -}}
              }
          }{{end}}
      ];
  </script>
    <script 
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
    crossorigin=""
  ></script>
  <script src="/static/app.js" defer></script>
    
    <footer>
        <p>Groupie Tracker - All Rights Reserved &copy; 2024</p>
    </footer>
</body>
</html>
