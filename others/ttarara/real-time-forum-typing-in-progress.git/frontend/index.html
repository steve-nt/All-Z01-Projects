<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Forum</title>
    <link rel="stylesheet" href="/frontend/dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOutRight {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* Hide scrollbar for tab navigation */
        nav.overflow-x-auto::-webkit-scrollbar {
            display: none;
        }

        nav.overflow-x-auto {
            -ms-overflow-style: none;
        }

        @keyframes typingDot {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.7;
            }

            30% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- ========================= -->
    <!-- Header / Navigation Bar   -->
    <!-- Controls: app.js (navigation rendering, auth-aware links) -->
    <!-- ========================= -->
    <nav id="nav" class="sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold gradient-text cursor-pointer hover:opacity-80 transition-opacity"
                        onclick="window.navigateTo('/'); return false;" style="cursor: pointer;">Tech Talk</h1>
                </div>
                <div id="nav-links" class="flex items-center space-x-4">
                    <!-- Links will be dynamically inserted here (auth-aware; controlled by app.js navigation rendering) -->
                </div>
            </div>
        </div>
    </nav>

    <!-- ========================= -->
    <!-- Main Content Container    -->
    <!-- Controlled by: app.js (renderPage and sub-renderers) -->
    <!-- JS injects all page content here; keep id stable -->
    <!-- ========================= -->
    <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Content will be dynamically inserted here -->
    </div>

    <!-- ========================= -->
    <!-- Users Status Box + Chat UI -->
    <!-- Controlled by: statusBox.js and messages.js -->
    <!-- Visible only when authenticated; shown/hidden via JS -->
    <!-- IDs are contractually used by JS; do not rename/move -->
    <!-- ========================= -->
    <div id="users-status-box" class="hidden"
        style="position: fixed; right: 24px; top: 96px; width: 340px; height: 650px; border-radius: 20px; z-index: 50; display: none; flex-direction: column; overflow: hidden; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); border: 1px solid rgba(148, 163, 184, 0.2); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;">
        <div id="status-header" class="cursor-move flex items-center justify-between"
            style="padding: 20px 20px; background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%); border-bottom: 1px solid rgba(148, 163, 184, 0.1); backdrop-filter: blur(10px);">
            <div class="flex items-center space-x-3" style="flex: 1; min-width: 0;">
                <div class="relative" style="flex-shrink: 0;">
                    <div class="absolute inset-0 bg-green-500/20 blur-xl rounded-full"></div>
                    <svg class="w-7 h-7 text-green-400 relative z-10" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24" style="filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.5));">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                        </path>
                    </svg>
                </div>
                <div style="min-width: 0;">
                    <h2 class="text-lg font-bold text-white leading-tight"
                        style="background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 0;">
                        Users Status</h2>
                    <p class="text-xs text-slate-400 mt-0.5" style="margin: 0;">Who's online now</p>
                </div>
            </div>
            <button id="minimize-status"
                class="text-slate-400 hover:text-white hover:bg-slate-700/50 text-2xl leading-none w-9 h-9 flex items-center justify-center rounded-xl transition-all duration-200 hover:scale-110 flex-shrink-0"
                title="Minimize" style="font-weight: 300; margin-left: 12px;">×</button>
        </div>
        <div id="users-status-list" class="flex-1 overflow-y-auto"
            style="background: rgba(15, 23, 42, 0.3); padding: 12px;">
            <!-- Users status list will be inserted here -->
        </div>

        <!-- Chat Interface (hidden by default) -->
        <div id="chat-interface" class="hidden absolute inset-0"
            style="display: none; flex-direction: column; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); z-index: 10; height: 100%;">
            <!-- Chat Header -->
            <div id="chat-header"
                style="flex-shrink: 0; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(148, 163, 184, 0.1); background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%); backdrop-filter: blur(10px);">
                <div style="display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;">
                    <button id="back-to-users-btn"
                        style="color: #94a3b8; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 12px; transition: all 0.2s; font-weight: 300; font-size: 20px; flex-shrink: 0; background: transparent; border: none; cursor: pointer;"
                        onmouseover="this.style.background='rgba(148, 163, 184, 0.1)'; this.style.color='white';"
                        onmouseout="this.style.background='transparent'; this.style.color='#94a3b8';"
                        title="Back to users">←</button>
                    <div id="chat-user-avatar"
                        style="width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #22c55e 0%, #10b981 50%, #059669 100%); border: 2px solid rgba(34, 197, 94, 0.3); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); flex-shrink: 0;">
                        <svg style="width: 18px; height: 18px; color: white;" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                        <h3 id="chat-username"
                            style="font-weight: 600; color: white; font-size: 15px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        </h3>
                        <p id="chat-status"
                            style="font-size: 12px; color: #94a3b8; margin: 2px 0 0 0; display: flex; align-items: center; gap: 6px;">
                        </p>
                    </div>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="chat-messages"
                style="flex: 1; overflow-y: auto; background: rgba(15, 23, 42, 0.15); padding: 20px 16px; display: flex; flex-direction: column; gap: 4px; min-height: 0; scrollbar-width: thin; scrollbar-color: rgba(148, 163, 184, 0.3) transparent;">
                <!-- Messages will be inserted here -->

                <!-- Typing Indicator -->
                <div id="typing-indicator"
                    style="display: none; padding: 8px 14px; margin-bottom: 6px; align-items: center; gap: 8px;">
                    <div
                        style="display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: rgba(30, 41, 59, 0.8); border-radius: 18px; border-bottom-left-radius: 4px; border: 1px solid rgba(148, 163, 184, 0.2);">
                        <span class="typing-username"
                            style="font-size: 12px; color: #94a3b8; margin-right: 4px;"></span>
                        <span style="font-size: 12px; color: #94a3b8;">is typing</span>
                        <div class="typing-dots" style="display: inline-flex; gap: 3px; margin-left: 4px;">
                            <span class="typing-dot"
                                style="width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; animation: typingDot 1.4s infinite;"></span>
                            <span class="typing-dot"
                                style="width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; animation: typingDot 1.4s infinite; animation-delay: 0.2s;"></span>
                            <span class="typing-dot"
                                style="width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; animation: typingDot 1.4s infinite; animation-delay: 0.4s;"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div id="chat-input-container"
                style="flex-shrink: 0; padding: 16px; border-top: 1px solid rgba(148, 163, 184, 0.1); background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%); backdrop-filter: blur(10px);">
                <form id="chat-form" style="display: flex; align-items: flex-end; gap: 12px;">
                    <div style="flex: 1; position: relative;">
                        <textarea id="chat-input"
                            placeholder="Type a message... (Press Enter to send, Shift+Enter for new line)" rows="1"
                            style="width: 100%; padding: 12px 16px; border-radius: 16px; font-size: 14px; outline: none; resize: none; background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148, 163, 184, 0.2); color: #f1f5f9; max-height: 120px; min-height: 44px; font-family: inherit;"
                            autocomplete="off"></textarea>
                    </div>
                    <button type="submit"
                        style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); color: white; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); border: none; cursor: pointer; flex-shrink: 0;"
                        onmouseover="this.style.transform='scale(1.1)';" onmouseout="this.style.transform='scale(1)';"
                        title="Send message">
                        <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ========================= -->
    <!-- Script loading (keep order) -->
    <!-- app.js: Main application entrypoint; initializes routing, auth checks, WS, UI rendering -->
    <!-- Must load after DOM to attach listeners safely -->
    <!-- ========================= -->
    <script src="/frontend/app.js"></script>
</body>

</html>
