{{define "login"}}

<body class="h-full">
  <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <a href="/home">
        <img class="h-10 w-auto mx-auto" src="/assets/app/logo.png" alt="Your Company">
        <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900">Sign in to your account</h2>
      </a>
    </div>

    <!-- Flash Message -->
    {{range $error := index .Data "error"}}
    <div class="mt-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-md relative" role="alert">
      <span class="block px-3 sm:inline">{{.}}</span>
    </div>
    {{end}}


    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
      <form class="space-y-6" action="/login" method="POST">
        <input type="hidden" name="csrf" value="{{index .Session.Data "csrf" }}">
        <input type="hidden" name="redirect" value="{{.Redirect}}">
        <div>
          <label for="email" class="block text-sm/6 font-medium text-gray-900">Email address</label>
          <div class="mt-2">
            <input type="email" {{ if index .Data "old_email" }} value="{{index .Data "old_email" }}" {{end}}
              name="email" id="email" autocomplete="email" required
              class="block w-full rounded-md bg-gray-50 px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm/6 font-medium text-gray-900">Password</label>
          </div>
          <div class="mt-2 relative">
            <input type="password" name="password" id="password" autocomplete="current-password" required
              class="block w-full rounded-md bg-gray-50 px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
            <button type="button" data-toggle="password" data-target="password"
              class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
              Show
            </button>
          </div>
        </div>

        <div>
          <button type="submit"
            class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Sign
            in</button>
        </div>
      </form>
      <div class="flex flex-col gap-y-8 items-center w-full">
        <div>
          <p class="mt-5 text-center text-lg text-gray-500">
            Not a member?
            <a href="/register" class="font-semibold text-indigo-600 hover:text-indigo-500">Register now!</a>
            <br>
            Changed your mind?
            <a href="/home" class="font-semibold text-indigo-600 hover:text-indigo-500">Back to home</a>
          </p>
        </div>
        <div class="flex flex-col gap-y-4">
          <div>
            <a href="/login/oauth/google">
              <button
                class="bg-indigo-500 w-full p-4 px-8 rounded-md text-white flex flex-row items-center gap-x-4 cursor-pointer hover:bg-indigo-400"><svg
                  xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google"
                  viewBox="0 0 16 16">
                  <path
                    d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z" />
                </svg>Login with Google</button>
            </a>
          </div>
          <div>
            <a href="/login/oauth/github">
              <button
                class="bg-indigo-500 w-full p-4 px-8 rounded-md text-white flex flex-row items-center gap-x-4 cursor-pointer hover:bg-indigo-400"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16">
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
                </svg>
                </svg>Login with Github</button>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/assets/app/register.js"></script>
  {{end}}
