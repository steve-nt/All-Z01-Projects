<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker - Dates</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/dates.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body id="bd">
    <div class="container">
        <h1 class="title">Concert Dates</h1>
        <div id="dates"></div>
        <a href="/" class="backBtn">Back to Gallery</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <script>
        // Extract artist ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');

        // Fetch concert dates data and display it
        fetch(`api/dates/${artistId}`)
        .then(response => {
            if (!response.ok) {
                console.log("Status Code:", response.status);
                const errorHTML = "<h1>Error Occurred</h1><p>Bad request</p>";
              // If response not OK, try to parse error message from JSON and throw error
                return response.text().then(html => {
                document.getElementById('bd').innerHTML = errorHTML;
                throw new Error( 'Error fetching locations data.');
              });
            }
            // If OK, parse JSON
            return response.json();
          })
            
            .then(data => {
                const datesDiv = document.getElementById('dates');
                datesDiv.innerHTML = `<h2>Concert Dates for Artist: ${data.artistName}</h2>`;
                
                data.dates.forEach(date => {
                    datesDiv.innerHTML += `
                        <div class="list-group">
                            <div class="card-body">
                                <h5 class="card-title">📅 Date</h5>
                                <p class="card-text">${date}</p>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Error fetching concert dates:', error));
    </script>
</body>
</html>
