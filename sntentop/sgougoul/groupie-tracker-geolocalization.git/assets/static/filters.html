<!-- static/filters.html -->
<div id="filters" class="my-4">
    <h4>Filters</h4>

    <!-- Creation Date Range Box -->
    <div class="filter-box">
        <label>Creation Date:</label><br>
        <input type="number" id="creationFrom" placeholder="From" style="color: #fff; background-color: rgba(255,255,255,0.1); border: 1px solid #ccc; color-scheme: dark;"> -
        <input type="number" id="creationTo" placeholder="To" style="color: #fff; background-color: rgba(255,255,255,0.1); border: 1px solid #ccc; color-scheme: dark;">
    </div>

    <!-- First Album Year Box -->
    <div class="filter-box">
        <label>First Album Year:</label><br>
        <input type="number" id="albumFrom" placeholder="From"> -
        <input type="number" id="albumTo" placeholder="To">
    </div>

    <!-- Members Box -->
    <div class="filter-box">
        <label class="d-block mb-2">Members:</label>
        <div class="row gx-3 gy-2">
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="1" class="me-3"> 1
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="2" class="me-3"> 2
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="3" class="me-3"> 3
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="4" class="me-3"> 4
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="5" class="me-3"> 5
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="6" class="me-3"> 6
            </label>
          </div>
          <div class="col-auto">
            <label class="d-flex align-items-center">
              <input type="checkbox" name="members" value="7" class="me-3"> 7+
            </label>
          </div>
        </div>
      </div>
      
      
    <!-- Locations Box -->
    <div class="filter-box">
        <label for="locationsFilter">Locations:</label><br>
        <select id="locationsFilter">
       
            <option value="">-- Select a location --</option>
        </select>
    </div>

    <button id="applyFilters">Apply Filters</button>
    <button id="clearFilters">Clear Filters</button>

    
</div>

<head>
    <!-- Bootstrap CSS (Required for layout classes like row, col-auto, etc.) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-T3c6CoIi6E0Q2Z0ZpU6MI8Fd5U1jKNURyrrmBYg5nW9/tP1Spf9TAHfGMlJ/3V4j" crossorigin="anonymous">
        
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />

    <link rel="stylesheet" href="/static/filters.css"/>
</head>
