<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groupie Tracker - Locations</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/locations.css">
</head>
<body id="locs">
    <div class="container">
        <h1 class="title">Concert Locations</h1>

        <div class="mb-3">
          <button id="btnList" class="btn btn-outline-primary active">Show List</button>
          <button
            id="btnMap"
            class="btn btn-outline-primary"
            onclick="goToMap()"
          >Show Map</button>
        </div>

        <div id="locations"></div>
        <a href="/" class="backBtn">Back to Gallery</a>
    </div>

    <script>
        // Extract artist ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const artistId = urlParams.get('id');
      
        // Fetch locations data and display it
        fetch(`/api/locations?id=${artistId}`)
          .then(response => {
            if (!response.ok) {
                console.log("Status Code:", response.status);
                const errorHTML = "<h1>Error Occurred</h1><p>Bad request</p>";
              // If response not OK, try to parse error message from JSON and throw error
                return response.text().then(html => {
                document.getElementById('locs').innerHTML = errorHTML;
                throw new Error( 'Error fetching locations data.');
              });
            }
            // If OK, parse JSON
            return response.json();
          })
          .then(data => {
            const locationsDiv = document.getElementById('locations');
            locationsDiv.innerHTML = `<h2>Locations for Artist: ${data.artistName}</h2>`;
            data.locations.forEach(location => {
              locationsDiv.innerHTML += `
                <div class="list-group">
                  <div class="card-body">
                    <h5 class="card-title">📍 ${location}</h5>
                  </div>
                </div>
              `;
            });
          })
          .catch(error => console.error('Error fetching locations data:', error));


          function goToMap() {
            if (!artistId) return;
            window.location.href = `/map.html?id=${artistId}`;
          } 
      </script>
      
</body>
</html>
