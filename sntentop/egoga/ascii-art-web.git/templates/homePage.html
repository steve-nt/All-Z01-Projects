<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <link rel="stylesheet" type="text/css" href="../static/css/homePage.css">
</head>
<body>
    
    <div class="container">
        <header class="header">
            <h1>Welcome to ASCII Art Generator</h1>
        </header>
        <section class="form-section">
            <form action="/ascii-art" method="POST" class="ascii-form">
                <div class="form-group">
                    <label for="text" class="form-label">Enter Text:</label>
                    <input type="text" id="text" name="text" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="banner" class="form-label">Select Banner:</label>
                    <select id="banner" name="banner" class="form-select">
                        <option value="standard">Standard</option>
                        <option value="shadow">Shadow</option>
                        <option value="thinkertoy">Thinkertoy</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="submit-btn">Generate</button>
                </div>
            </form>
        </section>
    </div>
    
</body>
</html>
